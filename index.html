<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notatapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Notatapp</h1>
</header>

<div class="layout">
  <nav class="sidebar">

    <div class="sidebar-label">Vis</div>
    <button class="nav-btn active" onclick="showView('notes-list')" id="nav-notes-list">Alle notater</button>
    <button class="nav-btn" onclick="showView('todos-list')" id="nav-todos-list">Alle lister</button>

    <div class="sidebar-label">Opprett</div>
    <button class="nav-btn" onclick="showView('new-note')" id="nav-new-note">Nytt notat</button>
    <button class="nav-btn" onclick="showView('new-todo')" id="nav-new-todo">Ny todo-liste</button>

  </nav>

  <main>

    <div class="view active" id="view-notes-list">
      <div class="view-header">
        <span class="view-title">Tekstnotater</span>
        <button class="submit-btn" onclick="loadNotes()">Oppdater</button>
      </div>
      <div class="cards-grid" id="notes-container">
        <div class="loading"><div class="spinner"></div> Laster notater...</div>
      </div>
    </div>

    <div class="view" id="view-todos-list">
      <div class="view-header">
        <span class="view-title">Todo-lister</span>
        <button class="submit-btn" onclick="loadTodos()">Oppdater</button>
      </div>
      <div class="cards-grid" id="todos-container">
        <div class="loading"><div class="spinner"></div> Laster todo-lister...</div>
      </div>
    </div>

    <div class="view" id="view-new-note">
      <div class="view-header"><span class="view-title">Nytt notat</span></div>
      <div class="form-panel">
        <div class="form-group">
          <label for="note-title">Tittel</label>
          <input id="note-title" type="text" placeholder="Skriv tittel her...">
        </div>
        <div class="form-group">
          <label for="note-content">Innhold</label>
          <textarea id="note-content" placeholder="Skriv notatet..."></textarea>
        </div>
        <button class="submit-btn" id="create-note">Lagre notat</button>
      </div>
    </div>

    <div class="view" id="view-new-todo">
      <div class="view-header"><span class="view-title">Ny todo-liste</span></div>
      <div class="form-panel">
        <div class="form-group">
          <label for="todo-title">Tittel</label>
          <input id="todo-title" type="text" placeholder="Navn på liste...">
        </div>
        <div class="form-group">
          <label>Oppgaver</label>
          <div class="task-input-row">
            <input id="task-input" type="text" placeholder="Ny oppgave...">
            <button id="add-task">Legg til</button>
          </div>
          <ul class="task-draft-list" id="draft"></ul>
        </div>
        <button class="submit-btn" id="create-todo">Lagre liste</button>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>

// henter JSON fra APIet
const api = (path, opts) => fetch('/api' + path, opts).then(r => r.json());

// bytter hvilken side som vises
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + viewId)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { 'notes-list': 'nav-notes-list', 'todos-list': 'nav-todos-list', 'new-note': 'nav-new-note', 'new-todo': 'nav-new-todo' };
  document.getElementById(map[viewId])?.classList.add('active');
}

// henter notater og viser dem
async function loadNotes() {
  const c = document.getElementById('notes-container');
  c.innerHTML = '<div class="loading"><div class="spinner"></div> Laster notater...</div>';
  try {
    const notes = await api('/notes');
    if (!notes.length) { c.innerHTML = '<div class="empty-state"><span class="big">Ingen notater</span>Lag et nytt notat for å komme i gang.</div>'; return; }
    c.innerHTML = '';
    for (const n of notes) {
      const el = document.createElement('article');
      el.className = 'card';
      el.innerHTML = `<div class="card-date">${new Date(n.createdAt).toLocaleString()}</div><h3>${esc(n.title)}</h3><p>${esc(n.content)}</p><button class="delete-btn" onclick="deleteNote('${n.id}')">Slett</button>`;
      c.appendChild(el);
    }
  } catch { showToast('Feil ved lasting', true); }
}

async function deleteNote(id) {
  await fetch('/api/notes/' + id, { method: 'DELETE' });
  loadNotes();
}

// henter todo-lister og viser dem
async function loadTodos() {
  const c = document.getElementById('todos-container');
  c.innerHTML = '<div class="loading"><div class="spinner"></div> Laster todo-lister...</div>';
  try {
    const lists = await api('/todos');
    if (!lists.length) { c.innerHTML = '<div class="empty-state"><span class="big">Ingen lister</span>Lag en liste for å komme i gang.</div>'; return; }
    c.innerHTML = '';
    for (const l of lists) {
      const el = document.createElement('article');
      el.className = 'card';
      const tasks = (l.tasks || []).map(t => `<li class="${t.completed ? 'done' : ''}" onclick="toggleTask('${l.id}','${t.id}')"><span class="task-check">${t.completed ? '[x]' : ''}</span>${esc(t.text)}</li>`).join('');
      el.innerHTML = `<div class="card-date">${new Date(l.createdAt).toLocaleString()}</div><h3>${esc(l.title)}</h3><ul class="task-list">${tasks}</ul><button class="delete-btn" onclick="deleteTodo('${l.id}')">Slett</button>`;
      c.appendChild(el);
    }
  } catch { showToast('Feil ved lasting', true); }
}

async function deleteTodo(id) { await fetch('/api/todos/' + id, { method: 'DELETE' }); loadTodos(); }

// krysser av eller fjerner avkryssing
async function toggleTask(listId, taskId) { await fetch(`/api/todos/${listId}/tasks/${taskId}`, { method: 'PATCH' }); loadTodos(); }

// lagrer nytt notat
document.getElementById('create-note')?.addEventListener('click', async () => {
  const title = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  if (!title || !content) { showToast('Tittel og innhold kreves', true); return; }
  await fetch('/api/notes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, content }) });
  document.getElementById('note-title').value = '';
  document.getElementById('note-content').value = '';
  showToast('Notat lagret'); showView('notes-list'); loadNotes();
});

// oppgaver som ikke er lagret ennå
let draftTasks = [];

document.getElementById('add-task')?.addEventListener('click', () => {
  const input = document.getElementById('task-input');
  const txt = input.value.trim();
  if (!txt) return;
  draftTasks.push({ text: txt }); input.value = ''; renderDraft();
});

// tegner opp utkastlisten på nytt
function renderDraft() {
  document.getElementById('draft').innerHTML = draftTasks.map((t, i) =>
    `<li>${esc(t.text)} <button onclick="removeDraft(${i})">Fjern</button></li>`
  ).join('');
}

window.removeDraft = (i) => { draftTasks.splice(i, 1); renderDraft(); };

// lagrer ny todo-liste
document.getElementById('create-todo')?.addEventListener('click', async () => {
  const title = document.getElementById('todo-title').value.trim();
  if (!title) { showToast('Tittel kreves', true); return; }
  await fetch('/api/todos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, tasks: draftTasks }) });
  document.getElementById('todo-title').value = ''; draftTasks = []; renderDraft();
  showToast('Liste lagret'); showView('todos-list'); loadTodos();
});

// viser melding nede til høyre, rød ved feil
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = isError ? 'error show' : 'show';
  setTimeout(() => t.className = '', 2500);
}

// gjør om spesialtegn så de ikke tolkes som HTML
function esc(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

loadNotes(); loadTodos();

function initNav() {
  document.getElementById('nav-notes-list').addEventListener('click', () => showView('notes-list'));
  document.getElementById('nav-todos-list').addEventListener('click', () => showView('todos-list'));
  document.getElementById('nav-new-note').addEventListener('click', () => showView('new-note'));
  document.getElementById('nav-new-todo').addEventListener('click', () => showView('new-todo'));
}
initNav();

</script>
</body>
</html>
